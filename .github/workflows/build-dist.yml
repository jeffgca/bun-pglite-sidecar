name: Build & Verify Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build + Version Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary: dist/sidecar-x86_64-unknown-linux-gnu
            shell: bash
          - os: macos-13
            label: macos-x86_64
            binary: dist/sidecar-x86_64-apple-darwin
            shell: bash
          - os: macos-14
            label: macos-arm64
            binary: dist/sidecar-aarch64-apple-darwin
            shell: bash
          - os: windows-latest
            label: windows-x86_64
            binary: dist/sidecar-x86_64-pc-windows-msvc.exe
            shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Show Bun & Node versions
        run: |
          bun --version
          node --version

      - name: Detect Rust host triple
        id: hostInfo
        run: echo "tripledouble=$(rustc -vV | awk '/^host:/ {print $2}') >> $GITHUB_OUTPUT"
        shell: bash

      - name: Determine app base name from package.json
        id: basename
        run: echo "outfile=$(bun scripts/get-build-file.ts --bare)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build matched binary (clean dist)
        run: |
          CLEAN_DIST=1 BUILD_ONLY=${{ matrix.label }} scripts/build-dist.sh
        shell: bash

      - name: List dist contents
        run: ls -l dist
        shell: bash

      - name: Determine expected version
        id: pkg
        run: echo "version=$(bun scripts/get-version.ts)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Determine output file name
        id: outfile
        run: echo "outfile=$(bun scripts/get-build-file.ts)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Make executable (non-Windows)
        if: ${{ matrix.shell == 'bash' }}
        run: chmod +x "${{ matrix.binary }}"
        shell: bash

      - name: Verify matched binary prints version (Unix)
        if: ${{ matrix.shell == 'bash' }}
        run: |
          set -euo pipefail
          EXPECTED="${{ steps.pkg.outputs.version }}"
          echo "Expected version: $EXPECTED"
          echo "Testing ${{ matrix.binary }} --version"
          out="$("${{ matrix.binary }}" --version)"
          echo "Output: $out"
          if [[ "$out" != "$EXPECTED" ]]; then
            echo "Version mismatch (got '$out')" >&2
            exit 1
          fi
        shell: bash

      - name: Verify matched binary prints version (Windows)
        if: ${{ matrix.shell == 'pwsh' }}
        run: |
          $Expected = "${{ steps.pkg.outputs.version }}"
          Write-Host "Expected version: $Expected"
          $Binary = "${{ matrix.binary }}"
          Write-Host "Testing $Binary --version"
          $Out = & .\$Binary --version
          Write-Host "Output: $Out"
          if ($Out -ne $Expected) {
            Write-Error "Version mismatch (got '$Out')"
            exit 1
          }
        shell: pwsh

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.label }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
